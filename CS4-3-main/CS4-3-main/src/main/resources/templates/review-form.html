<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leave a Review – Warsha</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <style>
        body { background-color: #f8f9fa; }
        .star-btn { font-size: 2rem; cursor: pointer; color: #ccc; border: none; background: none; padding: 0 4px; transition: color .15s; }
        .star-btn.active, .star-btn:hover ~ .star-btn { color: #ccc; }
        .star-btn.active { color: #ffc107; }
        #star-row:hover .star-btn { color: #ffc107; }
        #star-row .star-btn:hover ~ .star-btn { color: #ccc; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 640px;">

    <!-- Page header -->
    <div class="mb-4">
        <a th:href="@{/appointments}" class="btn btn-outline-secondary btn-sm mb-3">&larr; My Appointments</a>
        <h1 class="h3 fw-bold">Leave a Review</h1>
        <p class="text-muted mb-0">
            Service: <strong th:text="${appointment.serviceType}"></strong> &nbsp;&bull;&nbsp;
            Worker: <strong th:text="${appointment.worker.fullName ?: appointment.worker.username}"></strong>
        </p>
        <p class="text-muted small">
            Completed on <span th:text="${#temporals.format(appointment.appointmentDate, 'dd MMM yyyy')}"></span>
        </p>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Review form -->
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/customer/review/{id}(id=${appointment.id})}" method="post">

                <!-- CSRF token (Spring Security) -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <!-- Star rating -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Rating <span class="text-danger">*</span></label>
                    <div id="star-row" class="d-flex align-items-center gap-1">
                        <button type="button" class="star-btn" data-value="1" title="1 – Poor">&#9733;</button>
                        <button type="button" class="star-btn" data-value="2" title="2 – Fair">&#9733;</button>
                        <button type="button" class="star-btn" data-value="3" title="3 – Good">&#9733;</button>
                        <button type="button" class="star-btn" data-value="4" title="4 – Very Good">&#9733;</button>
                        <button type="button" class="star-btn" data-value="5" title="5 – Excellent">&#9733;</button>
                    </div>
                    <input type="hidden" id="ratingInput" name="rating" value="" required />
                    <div id="ratingLabel" class="form-text mt-1 text-muted">Click a star to rate</div>
                </div>

                <!-- Comment -->
                <div class="mb-4">
                    <label for="comment" class="form-label fw-semibold">Comment <span class="text-danger">*</span></label>
                    <textarea id="comment" name="comment" rows="5"
                              class="form-control"
                              placeholder="Share your experience with this worker…"
                              maxlength="1000"
                              required></textarea>
                    <div class="form-text">Maximum 1 000 characters.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">Submit Review</button>
                    <a th:href="@{/appointments}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const labels = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];
    const stars  = document.querySelectorAll('.star-btn');
    const input  = document.getElementById('ratingInput');
    const lbl    = document.getElementById('ratingLabel');

    stars.forEach(star => {
        star.addEventListener('click', () => {
            const val = parseInt(star.dataset.value, 10);
            input.value = val;
            lbl.textContent = labels[val];
            stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.value, 10) <= val));
        });
    });
</script>
</body>
</html>
