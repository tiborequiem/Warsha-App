<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Error – Warsha</title>
  <style>
    body { background: #f0f4f8; font-family: 'IBM Plex Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; border: 1px solid #d0dbe8; border-radius: 4px; padding: 2.5rem; text-align: center; max-width: 400px; }
    h1 { font-size: 3rem; color: #1a56a4; margin-bottom: .5rem; }
    p { color: #5a6a7a; font-size: .95rem; margin-bottom: 1.5rem; }
    a { color: #1a56a4; text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1 th:text="${status}">404</h1>
    <p th:text="${message}">Something went wrong.</p>
    <a th:href="@{/}">Go back home →</a>
  </div>
</body>
</html>
