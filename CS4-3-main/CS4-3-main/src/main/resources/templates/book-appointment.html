<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Appointment – Warsha</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4f8; font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }
    nav {
      background: #1a56a4; padding: .9rem 2rem; display: flex;
      align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: .5rem; color: #fff; font-size: 1.2rem; font-weight: 600; text-decoration: none; }
    .logo-box { width: 28px; height: 28px; background: rgba(255,255,255,.2); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .logo-box svg { width: 16px; height: 16px; fill: #fff; }
    nav a { color: rgba(255,255,255,.85); text-decoration: none; font-size: .9rem; margin-left: 1.2rem; }
    nav a:hover { color: #fff; }
    .container { max-width: 560px; margin: 2rem auto; padding: 0 1.5rem; }
    .back-link { display: inline-block; color: #1a56a4; text-decoration: none; font-size: .85rem; margin-bottom: 1.2rem; }
    .back-link:hover { text-decoration: underline; }
    .worker-summary {
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 4px;
      padding: 1rem 1.2rem; margin-bottom: 1.5rem;
    }
    .worker-summary strong { color: #1a2332; font-size: .95rem; }
    .worker-summary span { font-size: .85rem; color: #5a6a7a; }
    .card {
      background: #fff; border: 1px solid #d0dbe8; border-top: 4px solid #1a56a4;
      border-radius: 4px; padding: 2rem 2.2rem;
    }
    .card-title { font-size: 1.05rem; font-weight: 600; color: #1a2332; margin-bottom: 1.4rem; }
    .alert { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; border-radius: 3px; padding: .65rem .9rem; font-size: .85rem; margin-bottom: 1.2rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .8rem; font-weight: 500; color: #3a4a5a; margin-bottom: .35rem; }
    input, textarea, select {
      width: 100%; border: 1px solid #c0cdd8; border-radius: 3px;
      background: #fff; color: #1a2332; font-family: inherit;
      font-size: .95rem; padding: .6rem .85rem; outline: none; transition: border-color .15s;
    }
    input:focus, textarea:focus { border-color: #1a56a4; box-shadow: 0 0 0 3px rgba(26,86,164,.1); }
    textarea { resize: vertical; min-height: 80px; }
    .btn {
      display: block; width: 100%; margin-top: 1.4rem; padding: .7rem;
      background: #1a56a4; color: #fff; border: none; border-radius: 3px;
      font-family: inherit; font-size: .95rem; font-weight: 600; cursor: pointer;
    }
    .btn:hover { background: #154888; }
  </style>
</head>
<body>
<nav>
  <a class="logo" th:href="@{/}">
    <div class="logo-box"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h8l-1 8 11-12h-8z"/></svg></div>
    Warsha
  </a>
  <div>
    <a th:href="@{/workers}">Workers</a>
    <a th:href="@{/logout}">Sign out</a>
  </div>
</nav>

<div class="container">
  <a class="back-link" th:href="@{/workers/{id}(id=${worker.id})}">← Back to profile</a>

  <div class="worker-summary">
    <strong th:text="${worker.fullName ?: worker.username}"></strong><br/>
    <span th:text="${worker.trade} + ' · ' + ${worker.serviceArea}"></span>
  </div>

  <div class="card">
    <div class="card-title">Book an Appointment</div>

    <div class="alert" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/appointments/book/{id}(id=${worker.id})}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label for="serviceType">Service Type</label>
        <input id="serviceType" type="text" name="serviceType"
               placeholder="e.g. Fix kitchen sink, Install light fixture" required/>
      </div>

      <div class="form-group">
        <label for="appointmentDate">Appointment Date &amp; Time</label>
        <input id="appointmentDate" type="datetime-local" name="appointmentDate" required
               th:min="${#temporals.format(minDate, 'yyyy-MM-dd''T''HH:mm')}"/>
      </div>

      <div class="form-group">
        <label for="notes">Additional Notes (optional)</label>
        <textarea id="notes" name="notes" placeholder="Any specific details for the worker…"></textarea>
      </div>

      <button class="btn" type="submit">Request Appointment</button>
    </form>
  </div>
</div>
</body>
</html>
