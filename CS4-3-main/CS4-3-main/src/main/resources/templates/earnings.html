<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Earnings – Warsha</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4f8; font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; color: #1a2332; }
    nav {
      background: #1a56a4; padding: .85rem 1.5rem; display: flex;
      align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: .5rem; font-size: 1.15rem; font-weight: 600; color: #fff; text-decoration: none; }
    .nav-logo svg { width: 20px; height: 20px; fill: #fff; }
    .nav-right { display: flex; align-items: center; gap: 1.2rem; }
    .nav-links { display: flex; align-items: center; gap: 1.2rem; }
    .nav-links a { color: rgba(255,255,255,.85); text-decoration: none; font-size: .88rem; font-weight: 500; transition: color .15s; }
    .nav-links a:hover { color: #fff; }
    .nav-links a.active { color: #fff; border-bottom: 2px solid rgba(255,255,255,.6); padding-bottom: 2px; }
    .nav-user { font-size: .85rem; color: rgba(255,255,255,.75); }
    .nav-user strong { color: #fff; }
    .worker-badge { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: #fff; font-size: .72rem; font-weight: 600; padding: .15rem .55rem; border-radius: 3px; text-transform: uppercase; letter-spacing: .05em; }
    .nav-logout { background: transparent; border: 1px solid rgba(255,255,255,.4); color: #fff; border-radius: 3px; padding: .3rem .75rem; font-family: inherit; font-size: .82rem; cursor: pointer; }
    .nav-logout:hover { background: rgba(255,255,255,.12); }
    .container { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }
    h1 { font-size: 1.4rem; font-weight: 600; color: #1a2332; margin-bottom: 1.2rem; }
    .summary {
      background: #fff; border: 1px solid #d0dbe8; border-radius: 4px;
      padding: 1.4rem 1.6rem; margin-bottom: 1.5rem;
      display: flex; gap: 2rem; flex-wrap: wrap;
    }
    .sum-item { }
    .sum-label { font-size: .75rem; font-weight: 500; color: #5a6a7a; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .3rem; }
    .sum-value { font-size: 1.6rem; font-weight: 600; color: #1a2332; }
    .sum-value.money { color: #15803d; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d0dbe8; border-radius: 4px; overflow: hidden; }
    thead { background: #f8fafc; }
    th { padding: .75rem 1rem; text-align: left; font-size: .8rem; font-weight: 500; color: #5a6a7a; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #d0dbe8; }
    td { padding: .85rem 1rem; font-size: .88rem; color: #1a2332; border-bottom: 1px solid #eef2f7; }
    tr:last-child td { border-bottom: none; }
    .amount { font-weight: 600; color: #15803d; }
    .empty { text-align: center; padding: 2.5rem; color: #5a6a7a; font-size: .9rem; }
    @media (max-width: 640px) { .nav-links { display: none; } .nav-right { gap: .6rem; } }
  </style>
  <base target="_self">
</head>
<body>
<nav>
  <a class="nav-logo" th:href="@{/}">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L3 14h8l-1 8 11-12h-8z"/></svg>
    Warsha
  </a>
  <div class="nav-right">
    <div class="nav-links">
      <a th:href="@{/worker/dashboard}">Dashboard</a>
      <a th:href="@{/appointments/worker}">Requests</a>
      <a th:href="@{/worker/earnings}" class="active">Earnings</a>
      <a th:href="@{/profile}">Profile</a>
    </div>
    <span class="nav-user"><strong th:text="${worker.username}">user</strong></span>
    <span class="worker-badge">Worker</span>
    <form th:action="@{/logout}" method="post" style="display:inline;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="nav-logout">Logout</button>
    </form>
  </div>
</nav>

<div class="container">
  <h1>Earnings History</h1>

  <div class="summary">
    <div class="sum-item">
      <div class="sum-label">Total Earnings</div>
      <div class="sum-value money" th:text="'EGP ' + ${totalEarnings}">EGP 0</div>
    </div>
    <div class="sum-item">
      <div class="sum-label">Completed Jobs</div>
      <div class="sum-value" th:text="${completedCount}">0</div>
    </div>
  </div>

  <table th:if="${completedAppointments != null and not #lists.isEmpty(completedAppointments)}">
    <thead>
    <tr>
      <th>Service</th>
      <th>Customer</th>
      <th>Date</th>
      <th>Amount</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="appt : ${completedAppointments}">
      <td th:text="${appt.serviceType}"></td>
      <td th:text="${appt.customer != null and appt.customer.fullName != null} ? ${appt.customer.fullName} : ${appt.customer.username}"></td>
      <td th:text="${#temporals.format(appt.appointmentDate, 'MMM d, yyyy')}"></td>
      <td class="amount" th:text="${worker.basePrice != null} ? ('EGP ' + ${worker.basePrice}) : '—'"></td>
    </tr>
    </tbody>
  </table>

  <div class="empty" th:if="${completedAppointments == null or #lists.isEmpty(completedAppointments)}">
    No completed appointments yet.
  </div>
</div>
</body>
</html>
