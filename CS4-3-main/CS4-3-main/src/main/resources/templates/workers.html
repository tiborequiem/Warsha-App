<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Find Workers – Warsha</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4f8; font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }
    nav {
      background: #1a56a4; padding: .9rem 2rem; display: flex;
      align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: .5rem; color: #fff; font-size: 1.2rem; font-weight: 600; text-decoration: none; }
    .logo-box { width: 28px; height: 28px; background: rgba(255,255,255,.2); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .logo-box svg { width: 16px; height: 16px; fill: #fff; }
    nav a { color: rgba(255,255,255,.85); text-decoration: none; font-size: .9rem; margin-left: 1.2rem; }
    nav a:hover { color: #fff; }
    .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
    h1 { font-size: 1.4rem; font-weight: 600; color: #1a2332; margin-bottom: 1.2rem; }
    .search-bar {
      background: #fff; border: 1px solid #d0dbe8; border-radius: 4px;
      padding: 1.2rem 1.4rem; display: flex; gap: .8rem; flex-wrap: wrap; margin-bottom: 1.5rem;
    }
    .search-bar input {
      flex: 1; min-width: 140px; border: 1px solid #c0cdd8; border-radius: 3px;
      padding: .55rem .8rem; font-family: inherit; font-size: .9rem; color: #1a2332; outline: none;
    }
    .search-bar input:focus { border-color: #1a56a4; box-shadow: 0 0 0 3px rgba(26,86,164,.1); }
    .btn-search {
      padding: .55rem 1.2rem; background: #1a56a4; color: #fff; border: none;
      border-radius: 3px; font-family: inherit; font-size: .9rem; font-weight: 500; cursor: pointer;
    }
    .btn-search:hover { background: #154888; }
    .worker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .worker-card {
      background: #fff; border: 1px solid #d0dbe8; border-radius: 4px;
      padding: 1.3rem 1.4rem; transition: border-color .15s;
    }
    .worker-card:hover { border-color: #1a56a4; }
    .worker-name { font-size: 1rem; font-weight: 600; color: #1a2332; margin-bottom: .25rem; }
    .worker-trade { font-size: .85rem; color: #1a56a4; font-weight: 500; margin-bottom: .5rem; }
    .worker-meta { font-size: .8rem; color: #5a6a7a; margin-bottom: .2rem; }
    .worker-rating { font-size: .85rem; color: #f59e0b; font-weight: 600; margin-top: .4rem; }
    .btn-view {
      display: inline-block; margin-top: .9rem; padding: .45rem .9rem;
      background: #1a56a4; color: #fff; border-radius: 3px; text-decoration: none;
      font-size: .85rem; font-weight: 500;
    }
    .btn-view:hover { background: #154888; }
    .empty { text-align: center; padding: 3rem 1rem; color: #5a6a7a; font-size: .95rem; }
  </style>
</head>
<body>
<nav>
  <a class="logo" th:href="@{/}">
    <div class="logo-box"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h8l-1 8 11-12h-8z"/></svg></div>
    Warsha
  </a>
  <div>
    <a th:href="@{/profile}">My Profile</a>
    <a th:href="@{/appointments}">Appointments</a>
    <a th:href="@{/logout}">Sign out</a>
  </div>
</nav>

<div class="container">
  <h1>Find Local Workers</h1>

  <form class="search-bar" th:action="@{/workers}" method="get">
    <input type="text" name="trade" placeholder="Trade (e.g. Plumber, Electrician)" th:value="${tradeFilter}"/>
    <input type="text" name="serviceArea" placeholder="Service area (e.g. Cairo)" th:value="${areaFilter}"/>
    <button class="btn-search" type="submit">Search</button>
  </form>

  <div class="worker-grid" th:if="${not #lists.isEmpty(workers)}">
    <div class="worker-card" th:each="w : ${workers}">
      <div class="worker-name" th:text="${w.fullName ?: w.username}"></div>
      <div class="worker-trade" th:text="${w.trade}"></div>
      <div class="worker-meta" th:if="${w.serviceArea}">
        <span th:text="'Area: ' + ${w.serviceArea}"></span>
      </div>
      <div class="worker-meta" th:if="${w.yearsExperience}">
        <span th:text="${w.yearsExperience} + ' yrs experience'"></span>
      </div>
      <div class="worker-rating" th:if="${w.averageRating}">
        ★ <span th:text="${#numbers.formatDecimal(w.averageRating, 1, 1)}"></span>
      </div>
      <a class="btn-view" th:href="@{/workers/{id}(id=${w.id})}">View Profile</a>
    </div>
  </div>

  <div class="empty" th:if="${#lists.isEmpty(workers)}">
    <p>No workers found matching your search. Try different filters.</p>
  </div>
</div>



</body>
</html>
