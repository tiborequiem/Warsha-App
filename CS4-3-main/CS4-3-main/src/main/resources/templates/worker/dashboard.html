<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Worker Dashboard – Warsha</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4f8; font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; color: #1a2332; }
    nav {
      background: #1a56a4; padding: .85rem 1.5rem; display: flex;
      align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: .5rem; font-size: 1.15rem; font-weight: 600; color: #fff; text-decoration: none; }
    .nav-logo svg { width: 20px; height: 20px; fill: #fff; }
    .nav-right { display: flex; align-items: center; gap: 1.2rem; }
    .nav-links { display: flex; align-items: center; gap: 1.2rem; }
    .nav-links a { color: rgba(255,255,255,.85); text-decoration: none; font-size: .88rem; font-weight: 500; transition: color .15s; }
    .nav-links a:hover { color: #fff; }
    .nav-links a.active { color: #fff; border-bottom: 2px solid rgba(255,255,255,.6); padding-bottom: 2px; }
    .nav-user { font-size: .85rem; color: rgba(255,255,255,.75); }
    .nav-user strong { color: #fff; }
    .worker-badge { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: #fff; font-size: .72rem; font-weight: 600; padding: .15rem .55rem; border-radius: 3px; text-transform: uppercase; letter-spacing: .05em; }
    .nav-logout { background: transparent; border: 1px solid rgba(255,255,255,.4); color: #fff; border-radius: 3px; padding: .3rem .75rem; font-family: inherit; font-size: .82rem; cursor: pointer; }
    .nav-logout:hover { background: rgba(255,255,255,.12); }
    .container { max-width: 960px; margin: 2rem auto; padding: 0 1.5rem; }
    h1 { font-size: 1.4rem; font-weight: 600; color: #1a2332; margin-bottom: .3rem; }
    .subtitle { font-size: .9rem; color: #5a6a7a; margin-bottom: 1.5rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card {
      background: #fff; border: 1px solid #d0dbe8; border-radius: 4px;
      padding: 1.2rem 1.4rem; text-align: center;
    }
    .stat-value { font-size: 1.6rem; font-weight: 600; color: #1a56a4; }
    .stat-label { font-size: .8rem; color: #5a6a7a; margin-top: .2rem; }
    .section-card {
      background: #fff; border: 1px solid #d0dbe8; border-radius: 4px;
      margin-bottom: 1.2rem; overflow: hidden;
    }
    .section-header {
      background: #f7f9fb; border-bottom: 1px solid #d0dbe8;
      padding: .85rem 1.4rem; display: flex; align-items: center; justify-content: space-between;
    }
    .section-header h2 { font-size: .95rem; font-weight: 600; color: #1a2332; }
    .section-header a { font-size: .82rem; color: #1a56a4; text-decoration: none; font-weight: 500; }
    .section-header a:hover { text-decoration: underline; }
    .section-body { padding: 1.2rem 1.4rem; }
    .mini-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: .7rem 0; border-bottom: 1px solid #f0f4f8;
    }
    .mini-item:last-child { border-bottom: none; }
    .mini-info strong { font-size: .9rem; color: #1a2332; }
    .mini-info span { font-size: .8rem; color: #5a6a7a; display: block; margin-top: .1rem; }
    .mini-badge {
      font-size: .72rem; font-weight: 600; padding: .2rem .5rem; border-radius: 12px;
    }
    .mini-badge-PENDING   { background: #fef9c3; color: #854d0e; }
    .mini-badge-CONFIRMED { background: #dbeafe; color: #1e40af; }
    .mini-badge-COMPLETED { background: #dcfce7; color: #15803d; }
    .mini-badge-CANCELLED { background: #f3f4f6; color: #6b7280; }
    .empty { text-align: center; padding: 1.5rem; color: #5a6a7a; font-size: .85rem; }
    .btn {
      padding: .4rem .9rem; border: none; border-radius: 3px; font-family: inherit; font-size: .83rem; font-weight: 500; cursor: pointer;
    }
    .btn-primary { background: #1a56a4; color: #fff; text-decoration: none; display: inline-block; }
    .btn-primary:hover { background: #154888; }
    .btn-success { background: #15803d; color: #fff; }
    .btn-success:hover { background: #166534; }
    @media (max-width: 640px) { .stats-row { grid-template-columns: 1fr; } .nav-links { display: none; } .nav-right { gap: .6rem; } }
  </style>
  <base target="_self">
</head>
<body>
<nav>
  <a class="nav-logo" th:href="@{/}">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L3 14h8l-1 8 11-12h-8z"/></svg>
    Warsha
  </a>
  <div class="nav-right">
    <div class="nav-links">
      <a th:href="@{/worker/dashboard}" class="active">Dashboard</a>
      <a th:href="@{/appointments/worker}">Requests</a>
      <a th:href="@{/worker/earnings}">Earnings</a>
      <a th:href="@{/profile}">Profile</a>
    </div>
    <span class="nav-user"><strong th:text="${worker.username}">user</strong></span>
    <span class="worker-badge">Worker</span>
    <form th:action="@{/logout}" method="post" style="display:inline;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="nav-logout">Logout</button>
    </form>
  </div>
</nav>

<div class="container">
  <h1 th:text="'Welcome, ' + ${worker.fullName ?: worker.username} + '!'">Welcome!</h1>
  <p class="subtitle">Here is your dashboard overview.</p>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" th:text="${pendingCount}">0</div>
      <div class="stat-label">Pending Requests</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" th:text="${todaysCount}">0</div>
      <div class="stat-label">Today's Jobs</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" th:text="${#numbers.formatDecimal(totalEarnings, 1, 0)}">0</div>
      <div class="stat-label">Total Earnings (EGP)</div>
    </div>
  </div>

  <!-- Today's appointments -->
  <div class="section-card">
    <div class="section-header">
      <h2>Today's Appointments</h2>
      <a th:href="@{/appointments/worker}">View all →</a>
    </div>
    <div class="section-body">
      <div th:if="${not #lists.isEmpty(todaysAppointments)}">
        <div class="mini-item" th:each="appt : ${todaysAppointments}">
          <div class="mini-info">
            <strong th:text="${appt.serviceType}"></strong>
            <span th:text="${appt.customer.fullName ?: appt.customer.username} + ' · ' + ${#temporals.format(appt.appointmentDate, 'h:mm a')}"></span>
          </div>
          <span class="mini-badge" th:classappend="'mini-badge-' + ${appt.status}" th:text="${appt.status}"></span>
        </div>
      </div>
      <div class="empty" th:if="${#lists.isEmpty(todaysAppointments)}">No appointments scheduled for today.</div>
    </div>
  </div>

  <!-- All appointments -->
  <div class="section-card">
    <div class="section-header">
      <h2>All Appointments</h2>
    </div>
    <div class="section-body">
      <div th:if="${not #lists.isEmpty(allAppointments)}">
        <div class="mini-item" th:each="appt : ${allAppointments}">
          <div class="mini-info">
            <strong th:text="${appt.serviceType}"></strong>
            <span th:text="${appt.customer.fullName ?: appt.customer.username} + ' · ' + ${#temporals.format(appt.appointmentDate, 'MMM d, h:mm a')}"></span>
          </div>
          <div>
            <span class="mini-badge" th:classappend="'mini-badge-' + ${appt.status}" th:text="${appt.status}"></span>
          </div>
        </div>
      </div>
      <div class="empty" th:if="${#lists.isEmpty(allAppointments)}">No appointments yet.</div>
    </div>
  </div>
</div>
</body>
</html>
