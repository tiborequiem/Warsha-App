<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security6" lang="en">

<!-- ══════════════════════════════════════════════
     HEAD  →  th:replace="~{fragments/layout :: head('Page Title')}"
     ══════════════════════════════════════════════ -->
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' – Warsha'">Warsha</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap"
        rel="stylesheet"/>
  <style>
    :root {
      --w-blue:   #1a56a4;
      --w-blue-d: #154888;
      --w-bg:     #f0f4f8;
      --w-border: #d0dbe8;
      --w-text:   #1a2332;
      --w-muted:  #5a6a7a;
    }
    body { background: var(--w-bg); font-family: 'IBM Plex Sans', sans-serif; color: var(--w-text); }

    /* Navbar */
    .navbar-warsha                  { background: var(--w-blue); }
    .navbar-warsha .navbar-brand    { font-weight: 600; color: #fff; }
    .navbar-warsha .nav-link        { color: rgba(255,255,255,.8); font-size: .9rem; }
    .navbar-warsha .nav-link:hover,
    .navbar-warsha .nav-link.active { color: #fff; }
    .navbar-warsha .navbar-toggler  { border-color: rgba(255,255,255,.3); }
    .navbar-warsha .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255,255,255,.75)' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }
    .btn-nav { border: 1px solid rgba(255,255,255,.4); color: #fff; border-radius: 4px;
      padding: .25rem .8rem; font-size: .82rem; background: transparent; cursor: pointer; }
    .btn-nav:hover { background: rgba(255,255,255,.12); color: #fff; }

    /* Cards */
    .card-w { background: #fff; border: 1px solid var(--w-border);
      border-top: 4px solid var(--w-blue); border-radius: 4px; }

    /* Status pills */
    .pill            { display:inline-block; padding:.2rem .65rem; border-radius:20px; font-size:.75rem; font-weight:500; }
    .pill-PENDING    { background:#fef9c3; color:#854d0e; }
    .pill-CONFIRMED  { background:#dbeafe; color:#1e40af; }
    .pill-COMPLETED  { background:#dcfce7; color:#166534; }
    .pill-CANCELLED  { background:#fee2e2; color:#991b1b; }

    /* Validation errors */
    .field-error { font-size: .78rem; color: #b91c1c; margin-top: .2rem; }

    /* Footer */
    footer { background: var(--w-blue); color: rgba(255,255,255,.7);
      font-size: .82rem; padding: 1.2rem 0; margin-top: auto; }
    footer a { color: rgba(255,255,255,.7); text-decoration: none; }
    footer a:hover { color: #fff; }
  </style>
</head>

<!-- ══════════════════════════════════════════════
     NAVBAR  →  th:replace="~{fragments/layout :: navbar}"
     ══════════════════════════════════════════════ -->
<nav th:fragment="navbar" class="navbar navbar-expand-md navbar-warsha px-3">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M13 2L3 14h8l-1 8 11-12h-8z"/></svg>
      Warsha
    </a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNav" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto mb-2 mb-md-0">
        <li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/workers}">Find a Worker</a></li>
        <li class="nav-item" sec:authorize="hasRole('USER')">
          <a class="nav-link" th:href="@{/appointments}">My Appointments</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('WORKER')">
          <a class="nav-link" th:href="@{/appointments/worker}">My Jobs</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <span sec:authorize="isAuthenticated()" class="text-white-50 small me-1"
              sec:authentication="name"></span>
        <a sec:authorize="isAuthenticated()" th:href="@{/profile}"
           class="btn-nav text-decoration-none">Profile</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn-nav">Logout</button>
        </form>
        <a sec:authorize="!isAuthenticated()" th:href="@{/login}"
           class="btn-nav text-decoration-none">Sign in</a>
        <a sec:authorize="!isAuthenticated()" th:href="@{/register}"
           class="btn btn-warning btn-sm fw-semibold">Register</a>
      </div>
    </div>
  </div>
</nav>

<!-- ══════════════════════════════════════════════
     FLASH  →  th:replace="~{fragments/layout :: flash}"
     ══════════════════════════════════════════════ -->
<div th:fragment="flash">
  <div th:if="${successMessage}"
       class="alert alert-success alert-dismissible fade show rounded-0 mb-0 px-4 py-2 small"
       role="alert">
    <i class="bi bi-check-circle me-1"></i>
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <div th:if="${errorMessage}"
       class="alert alert-danger alert-dismissible fade show rounded-0 mb-0 px-4 py-2 small"
       role="alert">
    <i class="bi bi-exclamation-circle me-1"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     FOOTER  →  th:replace="~{fragments/layout :: footer}"
     ══════════════════════════════════════════════ -->
<footer th:fragment="footer">
  <div class="container text-center">
    &copy; 2025 Warsha &mdash; Find trusted local services near you.
  </div>
</footer>

<!-- ══════════════════════════════════════════════
     SCRIPTS  →  th:replace="~{fragments/layout :: scripts}"
     ══════════════════════════════════════════════ -->
<div th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmqFAkE1uwYFCVExQhK4rKiYNp"
          crossorigin="anonymous"></script>
</div>

</html>
