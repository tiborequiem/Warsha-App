<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Worker Dashboard – Warsha</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4f8; font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }
    nav {
      background: #1a56a4; padding: .9rem 2rem; display: flex;
      align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: .5rem; color: #fff; font-size: 1.2rem; font-weight: 600; text-decoration: none; }
    .logo-box { width: 28px; height: 28px; background: rgba(255,255,255,.2); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .logo-box svg { width: 16px; height: 16px; fill: #fff; }
    nav a { color: rgba(255,255,255,.85); text-decoration: none; font-size: .9rem; margin-left: 1.2rem; }
    nav a:hover { color: #fff; }
    .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
    h1 { font-size: 1.4rem; font-weight: 600; color: #1a2332; margin-bottom: 1.2rem; }
    .alert { border-radius: 3px; padding: .65rem .9rem; font-size: .85rem; margin-bottom: 1.2rem; }
    .alert-success { background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }
    .alert-error { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: #fff; border: 1px solid #d0dbe8; border-radius: 4px; padding: 1.2rem 1.4rem; }
    .stat-label { font-size: .75rem; font-weight: 500; color: #5a6a7a; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .4rem; }
    .stat-value { font-size: 1.8rem; font-weight: 600; color: #1a2332; }
    .stat-value.earnings { color: #15803d; }
    h2 { font-size: 1rem; font-weight: 600; color: #1a2332; margin-bottom: .8rem; }
    .appt-card {
      background: #fff; border: 1px solid #d0dbe8; border-radius: 4px;
      padding: 1.1rem 1.4rem; margin-bottom: .8rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
    }
    .appt-info { flex: 1; }
    .appt-service { font-size: .95rem; font-weight: 600; color: #1a2332; margin-bottom: .2rem; }
    .appt-meta { font-size: .82rem; color: #5a6a7a; }
    .badge { font-size: .75rem; font-weight: 600; padding: .25rem .6rem; border-radius: 12px; white-space: nowrap; }
    .badge-PENDING   { background: #fef9c3; color: #854d0e; }
    .badge-CONFIRMED { background: #dbeafe; color: #1e40af; }
    .badge-COMPLETED { background: #dcfce7; color: #15803d; }
    .badge-CANCELLED { background: #f3f4f6; color: #6b7280; }
    .appt-actions { display: flex; gap: .4rem; flex-wrap: wrap; }
    .btn { padding: .35rem .8rem; border: none; border-radius: 3px; font-family: inherit; font-size: .8rem; font-weight: 500; cursor: pointer; }
    .btn-primary { background: #1a56a4; color: #fff; }
    .btn-success { background: #15803d; color: #fff; }
    .btn-primary:hover { background: #154888; }
    .btn-success:hover { background: #166534; }
    .empty { color: #5a6a7a; font-size: .9rem; padding: 1rem 0; }
  </style>
</head>
<body>
<nav>
  <a class="logo" th:href="@{/}">
    <div class="logo-box"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h8l-1 8 11-12h-8z"/></svg></div>
    Warsha
  </a>
  <div>
    <a th:href="@{/worker/dashboard}">Dashboard</a>
    <a th:href="@{/worker/earnings}">Earnings</a>
    <a th:href="@{/profile}">Profile</a>
    <a th:href="@{/logout}">Sign out</a>
  </div>
</nav>

<div class="container">
  <h1>Welcome, <span th:text="${worker.fullName ?: worker.username}"></span></h1>

  <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
  <div class="alert alert-error"   th:if="${error}"   th:text="${error}"></div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Pending Requests</div>
      <div class="stat-value" th:text="${pendingCount}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today's Appointments</div>
      <div class="stat-value" th:text="${todaysCount}">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Earnings</div>
      <div class="stat-value earnings" th:text="'$' + ${#numbers.formatDecimal(totalEarnings, 1, 2)}">$0.00</div>
    </div>
  </div>

  <h2>All Appointments</h2>

  <div th:if="${not #lists.isEmpty(allAppointments)}">
    <div class="appt-card" th:each="appt : ${allAppointments}">
      <div class="appt-info">
        <div class="appt-service" th:text="${appt.serviceType}"></div>
        <div class="appt-meta">
          Customer: <strong th:text="${appt.customer.fullName ?: appt.customer.username}"></strong>
          · <span th:text="${#temporals.format(appt.appointmentDate, 'MMM d, yyyy h:mm a')}"></span>
        </div>
      </div>
      <div class="appt-actions">
        <span class="badge" th:classappend="'badge-' + ${appt.status}" th:text="${appt.status}"></span>
        <form th:if="${appt.status.name() == 'PENDING'}"
              th:action="@{/worker/appointments/{id}/accept(id=${appt.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button class="btn btn-primary" type="submit">Accept</button>
        </form>
        <form th:if="${appt.status.name() == 'CONFIRMED'}"
              th:action="@{/worker/appointments/{id}/complete(id=${appt.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button class="btn btn-success" type="submit">Complete</button>
        </form>
      </div>
    </div>
  </div>

  <p class="empty" th:if="${#lists.isEmpty(allAppointments)}">No appointments yet.</p>
</div>
</body>
</html>
