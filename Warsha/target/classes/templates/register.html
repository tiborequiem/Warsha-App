<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Warsha</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f0f4f8;
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem;
    }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .logo {
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: 1.6rem; font-weight: 600; color: #1a56a4; letter-spacing: -.5px;
    }
    .logo-box {
      width: 36px; height: 36px; background: #1a56a4; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-box svg { width: 20px; height: 20px; fill: #fff; }
    .tagline { font-size: .85rem; color: #5a6a7a; margin-top: .3rem; }
    .card {
      background: #fff;
      border: 1px solid #d0dbe8;
      border-top: 4px solid #1a56a4;
      border-radius: 4px;
      padding: 2rem 2.2rem;
      width: 100%; max-width: 400px;
    }
    .card-title { font-size: 1.05rem; font-weight: 600; color: #1a2332; margin-bottom: 1.4rem; }
    .alert {
      background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c;
      border-radius: 3px; padding: .65rem .9rem; font-size: .85rem; margin-bottom: 1.2rem;
    }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .8rem; font-weight: 500; color: #3a4a5a; margin-bottom: .35rem; }
    input {
      width: 100%; border: 1px solid #c0cdd8; border-radius: 3px;
      background: #fff; color: #1a2332; font-family: inherit;
      font-size: .95rem; padding: .6rem .85rem; outline: none; transition: border-color .15s;
    }
    input:focus { border-color: #1a56a4; box-shadow: 0 0 0 3px rgba(26,86,164,.1); }
    input::placeholder { color: #a0adb8; }
    .btn {
      display: block; width: 100%; margin-top: 1.4rem; padding: .7rem;
      background: #1a56a4; color: #fff; border: none; border-radius: 3px;
      font-family: inherit; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn:hover { background: #154888; }
    .btn:active { background: #0f3868; }
    .footer-link { text-align: center; margin-top: 1.2rem; font-size: .85rem; color: #5a6a7a; }
    .footer-link a { color: #1a56a4; text-decoration: none; font-weight: 500; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-box">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L3 14h8l-1 8 11-12h-8z"/></svg>
    </div>
    Warsha
  </div>
  <p class="tagline">Find trusted local services near you</p>
</div>

<div class="card">
  <div class="card-title">Create an account</div>

  <div class="alert" th:if="${error}" th:text="${error}"></div>

  <form th:action="@{/register}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" placeholder="e.g. ahmed_plumber" required autocomplete="username"/>
    </div>
    <div class="form-group">
      <label for="email">Email address</label>
      <input id="email" type="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Minimum 6 characters" required autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" type="password" name="confirmPassword" placeholder="Repeat password" required autocomplete="new-password"/>
    </div>
    <button class="btn" type="submit">Register</button>
  </form>

  <p class="footer-link">Already have an account? <a th:href="@{/login}">Sign in</a></p>
</div>
</body>
</html>
